services:
  - type: web
    name: ragforge-web
    env: docker
    plan: free
    branch: main
    autoDeploy: true
    envVars:
      - key: SERVICE_MODE
        value: web

  - type: worker
    name: ragforge-worker
    env: docker
    plan: free
    branch: main
    autoDeploy: true
    envVars:
      - key: SERVICE_MODE
        value: worker
